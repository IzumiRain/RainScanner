name: Update inside-api mirror

on:
  schedule:
    - cron: '17 3 * * *'   # daily at 03:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v2.0.0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Fetch and update range files
        run: go run ./cmd/cdnscan -update-inside-api inside-api
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add inside-api/
          git diff --cached --quiet || git commit -m "PreUpdate: refresh inside-api CDN range mirror [skip ci]"
          git push origin v2.0.0
