name: release

# Build release binaries on GitHub's runners (clean cross-compiles — no local
# Windows Defender false-positive quarantine) and attach them to a GitHub Release.
# Triggered by pushing a version tag, e.g.  git tag v1.0.0 && git push origin v1.0.0

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write          # required to create the Release

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            asset: rainscan-windows-amd64.exe
            xray_asset: Xray-windows-64.zip          # xray-core release asset for this target
            embed_dest: internal/xray/assets/xray-windows-amd64.zip
          - goos: linux
            goarch: amd64
            asset: rainscan-linux-amd64
            xray_asset: Xray-linux-64.zip
            embed_dest: internal/xray/assets/xray-linux-amd64.zip
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod   # tracks the toolchain pinned in go.mod (go 1.26)

      # Bake the matching xray-core into the binary: overwrite the committed
      # placeholder zip with the real release asset before compiling, so embed picks
      # it up. (A plain `go build` without this step embeds the empty placeholder.)
      - name: fetch xray-core for embedding
        env:
          XRAY_ASSET: ${{ matrix.xray_asset }}
          EMBED_DEST: ${{ matrix.embed_dest }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release download --repo XTLS/Xray-core --pattern "$XRAY_ASSET" --output "$EMBED_DEST" --clobber
          ls -l "$EMBED_DEST"

      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0            # pure-stdlib, static binary
        run: go build -trimpath -ldflags "-s -w" -o "${{ matrix.asset }}" ./cmd/cdnscan

      - name: upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: generate SHA256 checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS.txt

      - name: publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/rainscan-windows-amd64.exe
            dist/rainscan-linux-amd64
            dist/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
